name: Deploy UniLibra to Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_GOOGLE_LOGIN_URL: ${{ vars.VITE_GOOGLE_LOGIN_URL }}
        run: |
          npm ci
          npm run build

      - name: Check AI Python syntax
        run: python -m py_compile AI/main.py AI/cek_modul.py AI/migrate_data.py

  deploy-frontend:
    name: Deploy frontend Static Web App
    needs: checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_GOOGLE_LOGIN_URL: ${{ vars.VITE_GOOGLE_LOGIN_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          api_location: ""
          output_location: dist
          app_build_command: npm run build
