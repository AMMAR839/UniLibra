services:
  # Container Database
  db:
    image: pgvector/pgvector:pg15
    container_name: unilibra-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Container Backend
  backend:
    build:
      context: ./backend        
      dockerfile: Dockerfile
    container_name: unilibra-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Koneksi database diarahkan ke service "db" di atas
      DB_HOST: db 
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      AI_ENGINE_URL: http://ai-engine:8000
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/auth/google/callback}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_DIR: /app/uploads
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL:-http://localhost:8080/uploads}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-book-covers}
      AZURE_STORAGE_PUBLIC_BASE_URL: ${AZURE_STORAGE_PUBLIC_BASE_URL}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db
    
  
      
    # Compose Watch
    develop:
      watch:
        # 1. Jika file kode berubah, lakukan sync data (biarkan Air yang compile ulang)
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ../.git/
            - ../deployments/
            - ../tmp/         # Abaikan folder hasil build Air
        
        # 2. Jika daftar library berubah, rebuild container dari nol
        - action: rebuild
          path: ./backend/go.mod
        - action: rebuild
          path: ./backend/go.sum

# Container AI Engine (Python/FastAPI)
  ai-engine:
    build:
      context: ./AI       
      dockerfile: Dockerfile
    container_name: unilibra-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      AI_INTERNAL_TOKEN: ${AI_INTERNAL_TOKEN}
      GEMINI_API: ${GEMINI_API}
    depends_on:
      - db

volumes:
  postgres_data:
  uploads_data:
