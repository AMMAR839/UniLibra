name: Otomasi Build & Deploy Web UniLibra

on:
  # Berjalan otomatis setiap ada perubahan (push) di branch main
  push:
    branches: ["main"]
  # Bisa dijalankan manual dari tab Actions
  workflow_dispatch:

# Memberikan izin pada GitHub Action untuk menulis ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Otomasi Test Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build Website with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3

  # Otomasi Deployment
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
